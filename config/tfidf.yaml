# =============================================================================
# TF-IDF Analysis Module Configuration
# =============================================================================

input:
  # CONFIGURABLE: Path to the NLP-processed JSON file (relative to project root output dir)
  input_file: "jobs_cz_administrativa_nlp.json"

  # CONFIGURABLE: Field containing the tokenized text to analyze
  token_field: "description_tokens"

  # CONFIGURABLE: Field containing the cleaned (non-tokenized) text for phrase matching
  text_field: "description_text"

output:
  # CONFIGURABLE: Directory for analysis outputs (relative to project root output dir)
  output_dir: "tfidf_analysis"

  # CONFIGURABLE: Top-N terms JSON report filename
  report_file: "top_terms_report.json"

  # CONFIGURABLE: Competency analysis JSON report filename
  competency_report_file: "competency_report.json"

  # CONFIGURABLE: Bar chart PNG filename (top terms)
  chart_file: "top_terms_tfidf.png"

  # CONFIGURABLE: Bar chart PNG filename (competency prevalence)
  competency_chart_file: "competency_prevalence.png"

  # CONFIGURABLE: Interactive HTML dashboard filename
  interactive_file: "competency_dashboard.html"

  # CONFIGURABLE: Subgroup comparison JSON report filename
  subgroup_report_file: "subgroup_comparison.json"

  # CONFIGURABLE: Subgroup comparison chart PNG filename
  subgroup_chart_file: "subgroup_top_terms.png"

  # CONFIGURABLE: Framework summary JSON (built from config, for thesis consistency)
  framework_summary_file: "framework_summary.json"

  # CONFIGURABLE: Subgroup statistical significance JSON
  subgroup_significance_file: "subgroup_significance.json"

tfidf:
  # CONFIGURABLE: Maximum number of features (vocabulary size); 0 = unlimited
  max_features: 0

  # CONFIGURABLE: Minimum document frequency (absolute count)
  min_df: 3

  # CONFIGURABLE: Maximum document frequency (fraction)
  max_df: 0.90

  # CONFIGURABLE: N-gram range (1,2) = unigrams + bigrams
  ngram_min: 1
  ngram_max: 2

  # CONFIGURABLE: Number of top terms to extract
  top_n: 50

# ---------------------------------------------------------------------------
# Skill classification dictionaries (for TF-IDF top-N colouring)
# ---------------------------------------------------------------------------

classification:
  # Fallback — primary source is competencies.token_keywords (auto-generated).
  # These are additional soft-skill terms not covered by any competency definition.
  soft_skills:
    - "odpovědnost"
    - "zodpovědný"
    - "pečlivost"
    - "pečlivý"
    - "spolehlivost"
    - "důslednost"
    - "dovednost"
    - "schopnost"

  hard_skills:
    - "excel"
    - "word"
    - "office"
    - "sap"
    - "python"
    - "sql"
    - "erp"
    - "účetní"
    - "mzdový"
    - "faktura"
    - "daňový"
    - "legislativa"
    - "audit"
    - "controlling"
    - "reporting"
    - "certifikát"
    - "iso"
    - "gdpr"
    - "outlook"
    - "powerpoint"
    - "ekonomický"
    - "finanční"
    - "obchodní"
    - "logistický"
    - "právní"
    - "smlouva"
    - "pojištění"
    - "praxe"
    - "zkušenost"

# =============================================================================
# Competency Framework — Hybrid Detection (token keywords + phrase patterns)
# =============================================================================
# Each competency has:
#   token_keywords — matched against lemmatized tokens (from description_tokens)
#   phrase_patterns — matched as substrings against cleaned text (description_text, lowercased)
# A competency is "detected" if ANY keyword or phrase matches.
# The output reports which indicators fired and how many.

