visualization:
  # CONFIGURABLE: Chart figure size (width, height) in inches
  figure_width: 14
  figure_height: 8

  # CONFIGURABLE: Color for soft skills bars
  color_soft: "#4CAF50"

  # CONFIGURABLE: Color for hard skills bars
  color_hard: "#2196F3"

  # CONFIGURABLE: Color for noise bars
  color_noise: "#9E9E9E"

  # CONFIGURABLE: Chart title (top terms)
  title: "Top 50 Terms by Mean TF-IDF Score (uni+bigrams)"

  # CONFIGURABLE: Chart title (competency prevalence)
  competency_title: "Competency Prevalence in Job Listings"

  # CONFIGURABLE: Competency group colours
  color_osobnostni: "#FF9800"
  color_interpersonalni: "#4CAF50"
  color_kognitivni: "#2196F3"
  color_vykonove: "#9C27B0"

  # CONFIGURABLE: DPI for saved PNG
  dpi: 150

# =============================================================================
# Subgroup Analysis (e.g., Praha vs. Regiony)
# =============================================================================

subgroups:
  # CONFIGURABLE: Enable/disable subgroup analysis
  enabled: true

  # CONFIGURABLE: Field from the data rows used for splitting
  field: "location"

  # CONFIGURABLE: Match rule — "contains" checks if field value contains match string
  split_rule: "contains"

  groups:
    praha:
      label: "Praha"
      # CONFIGURABLE: Any row whose location contains "Praha"
      match: "Praha"
    regiony:
      label: "Regiony"
      # CONFIGURABLE: __default__ captures everything not matched above
      match: "__default__"

# =============================================================================
# Section-aware parsing — header_patterns keyed by section label
# Used by modules/tfidf/sections.py (split_into_sections).
# Patterns are compiled with re.IGNORECASE | re.MULTILINE,
# so ^ matches the start of every line in the ad text.
# Labels: requirements, responsibilities, benefits, company_pitch, other
# (anything before the first detected header becomes label "other")
# =============================================================================

sections:
  header_patterns:

    requirements:
      - "^\\s*po\u017eadujeme\\s*:?"
      - "^\\s*po\u017eadavky\\s*:?"
      - "^\\s*co\\s+od\\s+v\u00e1s\\s+o\u010dek\u00e1v\u00e1me\\s*:?"
      - "^\\s*co\\s+hled\u00e1me\\s*:?"
      - "^\\s*hled\u00e1me\\s+kandid\u00e1ta\\s*"
      - "^\\s*ide\u00e1ln\u00ed\\s+kandid\u00e1t\\s*:?"
      - "^\\s*v\u00e1\u0161\\s+profil\\s*:?"
      - "^\\s*co\\s+pot\u0159ebujete\\s*:?"
      - "^\\s*requirements?\\s*:?"
      - "^\\s*what\\s+we.?re\\s+looking\\s+for\\s*:?"

    responsibilities:
      - "^\\s*n\u00e1pl\u0148\\s+pr\u00e1ce\\s*:?"
      - "^\\s*pracovn\u00ed\\s+n\u00e1pl\u0148\\s*:?"
      - "^\\s*co\\s+budete\\s+d\u011blat\\s*:?"
      - "^\\s*co\\s+b\u016fde\\s+va\u0161\u00ed\\s+n\u00e1pl\u0148\u00ed\\s*:?"
      - "^\\s*co\\s+v\u00e1s\\s+\u010dek\u00e1\\s*:?"
      - "^\\s*va\u0161e\\s+\u00fakoly\\s*:?"
      - "^\\s*hlavn\u00ed\\s+odpov\u011bdnosti\\s*:?"
      - "^\\s*responsibilities?\\s*:?"
      - "^\\s*what\\s+you.?ll\\s+do\\s*:?"
      - "^\\s*job\\s+description\\s*:?"

    benefits:
      - "^\\s*(?:\U0001f381\\s*)?co\\s+(?:v\u00e1m\\s+)?nab\u00edz\u00edme\\s*:?"
      - "^\\s*(?:\U0001f381\\s*)?co\\s+v\u00e1m\\s+m\u016f\u017eeme\\s+nab\u00ednout\\s*:?"
      - "^\\s*(?:\U0001f381\\s*)?co\\s+(?:ti\\s+)?nab\u00eddneme\\s*:?"
      - "^\\s*(?:\U0001f381\\s*)?co\\s+dostanete\\s*:?"
      - "^\\s*(?:\U0001f381\\s*)?co\\s+z\u00edsk\u00e1te\\s*:?"
      - "^\\s*(?:\U0001f381\\s*)?co\\s+za\\s+to\\s+dostanete\\s*:?"
      - "^\\s*(?:\U0001f381\\s*)?(?:na\u0161e\\s+)?benefity\\s*:?"
      - "^\\s*(?:\U0001f381\\s*)?nab\u00edz\u00edme\\s*:"
      - "^\\s*(?:\U0001f381\\s*)?what\\s+we\\s+offer\\s*:?"
      - "^\\s*(?:\U0001f381\\s*)?we\\s+offer\\s*:"
      - "^\\s*(?:\U0001f381\\s*)?benefits?\\s*:"

    company_pitch:
      - "^\\s*o\\s+n\u00e1s\\s*:?"
      - "^\\s*o\\s+spole\u010dnosti\\s*:?"
      - "^\\s*kdo\\s+jsme\\s*:?"
      - "^\\s*na\u0161e\\s+spole\u010dnost\\s*:?"
      - "^\\s*o\\s+firm\u011b\\s*:?"
      - "^\\s*about\\s+us\\s*:?"
      - "^\\s*who\\s+we\\s+are\\s*:?"

# =============================================================================
# Dual-mode detection settings
# =============================================================================

detection:
  # Primary mode used for charts, dashboard, and per-job results.
  # Options: "all_text" | "target_sections_only"
  primary_mode: "target_sections_only"

  # Section labels whose text is searched in "target_sections_only" mode.
  # "other" is intentionally included so ads with no detected headers
  # (which fall back to a single "other" section) are not silently dropped.
  target_section_labels:
    - "requirements"
    - "responsibilities"
    - "other"

  # Significance level for subgroup z-tests
  significance_alpha: 0.05
